<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ate Sally's — Redirecting...</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --orange: #d94040;
            --cream: #f0f0db;
            --text: #1a1a1a;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background-color: var(--cream);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container { padding: 2rem; max-width: 400px; }
        
        /* Hidden by default, shown if Messenger is detected */
        #bridge-ui { display: none; }

        .logo { font-size: 3rem; margin-bottom: 1rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--orange); }
        p { line-height: 1.6; margin-bottom: 2rem; font-size: 0.95rem; }

        .instruction-box {
            background: #fff;
            padding: 1.5rem;
            border-radius: 14px;
            border: 2px dashed var(--orange);
            margin-bottom: 1.5rem;
        }

        .btn-chrome {
            display: block;
            background: var(--orange);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 30px;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .arrow { font-size: 1.5rem; display: block; margin-top: 10px; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">🍱</div>
        
        <div id="bridge-ui">
            <h1>Open in Browser</h1>
            <p>To ensure your <strong>Ate Sally's</strong> order receipt saves correctly, please open this in your phone's browser.</p>
            
            <div class="instruction-box">
                <strong>iPhone Users:</strong><br>
                Tap the <strong>⋯</strong> or <strong>Share</strong> icon below, then select <strong>"Open in Safari"</strong>.
                <span class="arrow">⬇️</span>
            </div>

            <div class="instruction-box">
                <strong>Android Users:</strong><br>
                Tap the button below:
                <a id="android-intent" href="#" class="btn-chrome" style="margin-top:10px;">🚀 Open in Chrome</a>
            </div>
        </div>

        <div id="loading-ui">
            <p>Loading Ate Sally's Menu...</p>
        </div>
    </div>

    <script>
        const targetUrl = "main.html"; // The filename of your menu
        const fullUrl = window.location.href.replace("index.html", targetUrl);
        
        // Detection Logic
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        const isMessenger = /FBAN|FBAV|Messenger/i.test(ua);
        const isAndroid = /Android/i.test(ua);

        if (isMessenger) {
            // Show instructions if in Messenger
            document.getElementById('loading-ui').style.display = 'none';
            document.getElementById('bridge-ui').style.display = 'block';

            // Set up Android Intent link
            if (isAndroid) {
                const intentLink = `intent://${window.location.host}/${targetUrl}#Intent;scheme=https;package=com.android.chrome;end`;
                document.getElementById('android-intent').href = intentLink;
            } else {
                // Hide Android button for iOS users
                document.getElementById('android-intent').parentElement.style.display = 'none';
            }
        } else {
            // Not in Messenger? Go straight to the menu!
            window.location.href = targetUrl;
        }
    </script>
</body>
</html>
